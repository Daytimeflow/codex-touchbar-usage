      <stop stop-color="#07100B"/>
      <stop offset="0.45" stop-color="#101914"/>
      <stop offset="1" stop-color="#1A241D"/>
    </linearGradient>
    <linearGradient id="touchbar" x1="138" y1="212" x2="1142" y2="212" gradientUnits="userSpaceOnUse">
